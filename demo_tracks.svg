<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="570" viewBox="0 0 1100 570" role="img" aria-labelledby="svgTitle svgDesc">
  <title id="svgTitle">SMAIRT Demo Track Gallery</title>
  <desc id="svgDesc">Nine SMAIRT demo tracks grouped by difficulty: Beginner (blue), Intermediate (green), Advanced (red), Flexible (gray).</desc>
  <defs>
    <style>
      .bg    { fill: #f3f4f6; }
      .panel { fill: #ffffff; stroke: #e5e7eb; stroke-width: 1.5; }
      .h1    { font: 700 25px Arial, Helvetica, sans-serif; fill: #111827; }
      .sub   { font: 400 13px Arial, Helvetica, sans-serif; fill: #6b7280; }
      .ct    { font: 700 15px Arial, Helvetica, sans-serif; fill: #111827; }
      .bp    { font: 400 12px Arial, Helvetica, sans-serif; fill: #374151; }
      .rp    { font: 700 11px Menlo, Consolas, monospace; fill: #4b5563; }
      .lg    { font: 700 10px Arial, Helvetica, sans-serif; letter-spacing: 0.5px; }
      /* card borders */
      .cb { fill: #fff; stroke: #2563eb; stroke-width: 2; }
      .ci { fill: #fff; stroke: #16a34a; stroke-width: 2; }
      .ca { fill: #fff; stroke: #dc2626; stroke-width: 2; }
      .cf { fill: #fff; stroke: #64748b; stroke-width: 2; }
      /* pill fills */
      .pb { fill: #dbeafe; }
      .pi { fill: #dcfce7; }
      .pa { fill: #fee2e2; }
      .pf { fill: #f1f5f9; }
      /* pill text */
      .tb { fill: #1d4ed8; }
      .ti { fill: #15803d; }
      .ta { fill: #b91c1c; }
      .tf { fill: #475569; }
    </style>
  </defs>

  <!-- Background + panel -->
  <rect width="1100" height="570" class="bg"/>
  <rect x="14" y="14" width="1072" height="542" rx="18" class="panel"/>

  <!-- Header -->
  <text x="38" y="52" class="h1">SMAIRT Demo Collection</text>
  <text x="38" y="72" class="sub">Nine Tracks · Background → Hypothesis → Code → Results → Analysis → Next Step</text>

  <!-- Inline legend (top right) -->
  <rect x="766" y="41" width="64" height="16" rx="8" class="pb"/>
  <text x="798" y="52" text-anchor="middle" class="lg tb">BEGINNER</text>
  <rect x="840" y="41" width="90" height="16" rx="8" class="pi"/>
  <text x="885" y="52" text-anchor="middle" class="lg ti">INTERMEDIATE</text>
  <rect x="940" y="41" width="66" height="16" rx="8" class="pa"/>
  <text x="973" y="52" text-anchor="middle" class="lg ta">ADVANCED</text>
  <rect x="1016" y="41" width="62" height="16" rx="8" class="pf"/>
  <text x="1047" y="52" text-anchor="middle" class="lg tf">FLEXIBLE</text>

  <!-- ── ROW 1 (y=86, h=143) ── BEGINNER ── -->

  <!-- Card 1: Lunar -->
  <rect x="38" y="86" width="332" height="143" rx="10" class="cb"/>
  <text x="50" y="111" class="ct">🚀 Lunar free-return</text>
  <rect x="50" y="118" width="64" height="14" rx="7" class="pb"/>
  <text x="82" y="128" text-anchor="middle" class="lg tb">BEGINNER</text>
  <text x="50" y="151" class="bp">• Parameter sweeps and trajectory modeling</text>
  <text x="50" y="169" class="bp">• Completed 3-iteration reference project</text>
  <text x="50" y="196" class="rp">repo: lunar</text>

  <!-- Card 2: Enzyme kinetics -->
  <rect x="382" y="86" width="332" height="143" rx="10" class="cb"/>
  <text x="394" y="111" class="ct">🧪 Enzyme kinetics</text>
  <rect x="394" y="118" width="64" height="14" rx="7" class="pb"/>
  <text x="426" y="128" text-anchor="middle" class="lg tb">BEGINNER</text>
  <text x="394" y="151" class="bp">• Recover Km and Vmax from noisy curve data</text>
  <text x="394" y="169" class="bp">• Nonlinear fitting and residual inspection</text>
  <text x="394" y="196" class="rp">repo: enzyme_kinetics</text>

  <!-- Card 3: Peptide digestion -->
  <rect x="726" y="86" width="332" height="143" rx="10" class="cb"/>
  <text x="738" y="111" class="ct">🧬 Peptide Digestion</text>
  <rect x="738" y="118" width="64" height="14" rx="7" class="pb"/>
  <text x="770" y="128" text-anchor="middle" class="lg tb">BEGINNER</text>
  <text x="738" y="151" class="bp">• Exact tryptic cleavage rule validation</text>
  <text x="738" y="169" class="bp">• Sequence rules to observable peptides</text>
  <text x="738" y="196" class="rp">repo: peptide_digest</text>

  <!-- ── ROW 2 (y=241, h=143) ── INTERMEDIATE ── -->

  <!-- Card 4: Protein properties -->
  <rect x="38" y="241" width="332" height="143" rx="10" class="ci"/>
  <text x="50" y="266" class="ct">🧫 Protein Properties</text>
  <rect x="50" y="273" width="88" height="14" rx="7" class="pi"/>
  <text x="94" y="283" text-anchor="middle" class="lg ti">INTERMEDIATE</text>
  <text x="50" y="306" class="bp">• Compute MW, pI, GRAVY from sequence</text>
  <text x="50" y="324" class="bp">• Separate membrane vs soluble proteins</text>
  <text x="50" y="351" class="rp">repo: protein_properties</text>

  <!-- Card 5: Differential abundance -->
  <rect x="382" y="241" width="332" height="143" rx="10" class="ci"/>
  <text x="394" y="266" class="ct">📊 Differential Abundance</text>
  <rect x="394" y="273" width="88" height="14" rx="7" class="pi"/>
  <text x="438" y="283" text-anchor="middle" class="lg ti">INTERMEDIATE</text>
  <text x="394" y="306" class="bp">• Planted fold change, p-values, FDR</text>
  <text x="394" y="324" class="bp">• Multiple testing control in proteomics</text>
  <text x="394" y="351" class="rp">repo: proteomics_de</text>

  <!-- Card 6: PPI network -->
  <rect x="726" y="241" width="332" height="143" rx="10" class="ci"/>
  <text x="738" y="266" class="ct">🕸 PPI Network</text>
  <rect x="738" y="273" width="88" height="14" rx="7" class="pi"/>
  <text x="782" y="283" text-anchor="middle" class="lg ti">INTERMEDIATE</text>
  <text x="738" y="306" class="bp">• Recover planted graph structure</text>
  <text x="738" y="324" class="bp">• Centrality and community detection</text>
  <text x="738" y="351" class="rp">repo: ppi_network</text>

  <!-- ── ROW 3 (y=396, h=143) ── MIXED ── -->

  <!-- Card 7: Protein LM (Advanced) -->
  <rect x="38" y="396" width="332" height="143" rx="10" class="ci"/>
  <text x="50" y="421" class="ct">🤖 Protein Language Model</text>
  <rect x="50" y="428" width="88" height="14" rx="7" class="pi"/>
  <text x="94" y="438" text-anchor="middle" class="lg ti">ADVANCED</text>
  <text x="50" y="461" class="bp">• Nano masked-language model training</text>
  <text x="50" y="479" class="bp">• Motif recovery and family embeddings</text>
  <text x="50" y="506" class="rp">repo: protein_lm</text>

  <!-- Card 8: HVP (Advanced) -->
  <rect x="382" y="396" width="332" height="143" rx="10" class="ca"/>
  <text x="394" y="421" class="ct">🦠 Human Virome Project</text>
  <rect x="394" y="428" width="66" height="14" rx="7" class="pa"/>
  <text x="427" y="438" text-anchor="middle" class="lg ta">ADVANCED</text>
  <text x="394" y="461" class="bp">• Phage-host links, evidence, geography</text>
  <text x="394" y="479" class="bp">• PostgreSQL database, richest infrastructure</text>
  <text x="394" y="506" class="rp">repo: hvp</text>

  <!-- Card 9: Bring your own (Flexible) -->
  <rect x="726" y="396" width="332" height="143" rx="10" class="cf"/>
  <text x="738" y="421" class="ct">🧭 Bring Your Own Problem</text>
  <rect x="738" y="428" width="62" height="14" rx="7" class="pf"/>
  <text x="769" y="438" text-anchor="middle" class="lg tf">FLEXIBLE</text>
  <text x="738" y="461" class="bp">• Start from your own research question</text>
  <text x="738" y="479" class="bp">• SMAIRT scaffold with added guardrails</text>
  <text x="738" y="506" class="rp">repo: bring_your_own</text>

</svg>
